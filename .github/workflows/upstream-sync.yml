name: Sync upstream (ycode/ycode)

# Pulls new commits from the upstream Ycode repo and opens a PR against your
# default branch. It NEVER pushes straight to your deploy branch — the PR runs
# `validate-upstream.yml` first, so a breaking upstream change is caught in CI
# instead of on your live site. Your `selfhost/` config is preserved by the
# merge (upstream never touches those files, so the merge is conflict-free).

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:        # ...or run manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM: https://github.com/ycode/ycode.git
  SYNC_BRANCH: upstream-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT so the opened PR is authored by a user (triggers validate CI),
          # and so pushes that touch .github/workflows/ are allowed.
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git + upstream
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM" || true
          git fetch upstream

      - name: Anything new upstream?
        id: check
        run: |
          if git diff --quiet HEAD upstream/main; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream/main."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into a sync branch
        if: steps.check.outputs.changed == 'true'
        run: |
          git checkout -B "$SYNC_BRANCH" "origin/${GITHUB_REF_NAME}"
          # Conflict-free by design: we never modify upstream-tracked files.
          # If this ever fails, the job fails loudly so you resolve manually.
          git merge --no-edit upstream/main
          git push -f origin "$SYNC_BRANCH"

      - name: Open / update PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --base "$GITHUB_REF_NAME" --head "$SYNC_BRANCH" \
            --title "⬆️ Sync upstream ycode/ycode" \
            --body "Automated upstream sync. CI (validate-upstream) must pass before merge." \
          || echo "PR already exists — branch was force-updated, CI will re-run."
